name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: hashicorp/setup-terraform@v4

      - name: Rails zeitwerk check
        env:
          RAILS_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB_TEST: rails_chat_test
          POSTGRES_DB_TEST_CACHE: rails_chat_test_cache
          POSTGRES_DB_TEST_QUEUE: rails_chat_test_queue
          POSTGRES_DB_TEST_CABLE: rails_chat_test_cable
        run: bundle exec rails zeitwerk:check

      - name: Terraform fmt
        run: terraform -chdir=infra/terraform/environments/staging fmt -check -recursive

      - name: Terraform validate (staging)
        run: |
          terraform -chdir=infra/terraform/environments/staging init -backend=false
          terraform -chdir=infra/terraform/environments/staging validate

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Run rspec
        env:
          RAILS_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB_TEST: rails_chat_test
          POSTGRES_DB_TEST_CACHE: rails_chat_test_cache
          POSTGRES_DB_TEST_QUEUE: rails_chat_test_queue
          POSTGRES_DB_TEST_CABLE: rails_chat_test_cable
        run: |
          bundle exec rails db:prepare
          bundle exec rspec

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec brakeman --no-pager
      - run: bundle exec bundler-audit check --update

  build:
    runs-on: ubuntu-latest
    needs: [validate, lint, test, security]
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t rails-chat:${{ github.sha }} .
