name: Deploy Production

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch ECR password for Kamal
        run: |
          echo "KAMAL_REGISTRY_PASSWORD=$(aws ecr get-login-password --region "${{ secrets.AWS_REGION }}")" >> "$GITHUB_ENV"

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_IMAGE_NAME: ${{ secrets.ECR_IMAGE_NAME }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_IMAGE_NAME:${GITHUB_SHA}" .
          docker push "$ECR_REGISTRY/$ECR_IMAGE_NAME:${GITHUB_SHA}"

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup SSH key for Kamal
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KAMAL_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $(echo "${{ secrets.PRODUCTION_WEB_HOSTS }}" | tr ',' ' ') >> ~/.ssh/known_hosts

      - name: Deploy with Kamal
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ env.KAMAL_REGISTRY_PASSWORD }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_IMAGE_NAME: ${{ secrets.ECR_IMAGE_NAME }}
          KAMAL_WEB_HOSTS: ${{ secrets.PRODUCTION_WEB_HOSTS }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY_PRODUCTION }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE_PRODUCTION }}
        run: bundle exec kamal deploy -d production --skip-push --version "${GITHUB_SHA}" -v
