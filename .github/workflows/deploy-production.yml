name: Deploy Production

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch ECR password for Kamal
        run: |
          echo "KAMAL_REGISTRY_PASSWORD=$(aws ecr get-login-password --region "${{ secrets.AWS_REGION }}")" >> "$GITHUB_ENV"

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_IMAGE_NAME: ${{ secrets.ECR_IMAGE_NAME }}
        run: |
          docker build --label service=rails-chat -t "$ECR_REGISTRY/$ECR_IMAGE_NAME:${GITHUB_SHA}" .
          docker push "$ECR_REGISTRY/$ECR_IMAGE_NAME:${GITHUB_SHA}"

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Discover runtime deploy targets
        run: |
          set -euo pipefail

          INSTANCE_TAG="rails-chat-production-web"
          PUBLIC_HOSTNAME="chat.schopp3r.de"

          WEB_HOSTS=""
          for _ in $(seq 1 30); do
            WEB_HOSTS="$(aws ec2 describe-instances \
              --region "${{ secrets.AWS_REGION }}" \
              --filters "Name=tag:Name,Values=${INSTANCE_TAG}" "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].PublicIpAddress' \
              --output text | tr '\t' '\n' | sed '/^$/d' | sort -u | paste -sd, -)"

            if [ -n "${WEB_HOSTS}" ]; then
              break
            fi

            sleep 10
          done

          if [ -z "${WEB_HOSTS}" ]; then
            echo "No running web hosts found for tag: ${INSTANCE_TAG}"
            exit 1
          fi

          echo "KAMAL_WEB_HOSTS=${WEB_HOSTS}" >> "$GITHUB_ENV"
          echo "ALLOWED_HOSTS=${PUBLIC_HOSTNAME}" >> "$GITHUB_ENV"
          echo "ALLOWED_CABLE_ORIGINS=https://${PUBLIC_HOSTNAME}" >> "$GITHUB_ENV"

      - name: Setup SSH key for Kamal
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          echo "${{ secrets.KAMAL_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          HOST_LIST="${KAMAL_WEB_HOSTS//,/ }"
          if [ -z "${HOST_LIST}" ]; then
            echo "KAMAL_WEB_HOSTS is empty"
            exit 1
          fi

          ssh-keyscan -H ${HOST_LIST} > ~/.ssh/known_hosts 2>/dev/null
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "Failed to generate known_hosts entries"
            exit 1
          fi

          chmod 644 ~/.ssh/known_hosts

      - name: Write Kamal secrets file
        run: |
          mkdir -p .kamal
          cat > .kamal/secrets-common <<EOF
          RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY_PRODUCTION }}
          DATABASE_URL=${{ secrets.DATABASE_URL_PRODUCTION }}
          SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE_PRODUCTION }}
          KAMAL_REGISTRY_PASSWORD=${{ env.KAMAL_REGISTRY_PASSWORD }}
          EOF

      - name: Deploy with Kamal
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ env.KAMAL_REGISTRY_PASSWORD }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_IMAGE_NAME: ${{ secrets.ECR_IMAGE_NAME }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY_PRODUCTION }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE_PRODUCTION }}
        run: bundle exec kamal deploy -d production --skip-push --version "${GITHUB_SHA}"
