name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          docker build -t "$ECR_REGISTRY/rails-chat:${GITHUB_SHA}" .
          docker push "$ECR_REGISTRY/rails-chat:${GITHUB_SHA}"

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup SSH key for Kamal
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KAMAL_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $(echo "${{ secrets.STAGING_WEB_HOSTS }}" | tr ',' ' ') >> ~/.ssh/known_hosts

      - name: Deploy with Kamal
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          KAMAL_WEB_HOSTS: ${{ secrets.STAGING_WEB_HOSTS }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY_STAGING }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE_STAGING }}
        run: bundle exec kamal deploy -d staging -v
