default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("POSTGRES_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "postgres") %>

development:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_DEVELOPMENT", "rails_chat_development") %>
  cache:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_DEVELOPMENT_CACHE", "rails_chat_development_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_DEVELOPMENT_QUEUE", "rails_chat_development_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_DEVELOPMENT_CABLE", "rails_chat_development_cable") %>
    migrations_paths: db/cable_migrate

test:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_TEST", "rails_chat_test") %>
  cache:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_TEST_CACHE", "rails_chat_test_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_TEST_QUEUE", "rails_chat_test_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_TEST_CABLE", "rails_chat_test_cable") %>
    migrations_paths: db/cable_migrate

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_PRODUCTION", "rails_chat_production") %>
    username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
    password: <%= ENV["RAILS_CHAT_DATABASE_PASSWORD"] || ENV.fetch("POSTGRES_PASSWORD", "postgres") %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch("POSTGRES_DB_PRODUCTION_CACHE", "rails_chat_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch("POSTGRES_DB_PRODUCTION_QUEUE", "rails_chat_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV.fetch("POSTGRES_DB_PRODUCTION_CABLE", "rails_chat_production_cable") %>
    migrations_paths: db/cable_migrate
