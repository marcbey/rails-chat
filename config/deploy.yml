service: rails-chat
image: <%= ENV.fetch("ECR_REGISTRY", "000000000000.dkr.ecr.eu-central-1.amazonaws.com") %>/rails-chat

servers:
  web: <%= ENV.fetch("KAMAL_WEB_HOSTS", "").split(",").map(&:strip).reject(&:empty?) %>

registry:
  server: <%= ENV.fetch("ECR_REGISTRY", "000000000000.dkr.ecr.eu-central-1.amazonaws.com") %>
  username: AWS
  password: <%= ENV.fetch("KAMAL_REGISTRY_PASSWORD", "") %>

env:
  clear:
    RAILS_ENV: production
    SOLID_QUEUE_IN_PUMA: "true"
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - SECRET_KEY_BASE

asset_path: /rails/public/assets

builder:
  arch: amd64

ssh:
  user: ec2-user

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  logs: app logs -f
