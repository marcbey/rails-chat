service: rails-chat
image: <%= ENV.fetch("ECR_IMAGE_NAME", "rails-chat") %>

servers:
  web: <%= ENV.fetch("KAMAL_WEB_HOSTS", "").split(",").map(&:strip).reject(&:empty?) %>

registry:
  server: <%= ENV.fetch("ECR_REGISTRY", "000000000000.dkr.ecr.eu-central-1.amazonaws.com") %>
  username: AWS
  password: <%= ENV.fetch("KAMAL_REGISTRY_PASSWORD", "") %>

env:
  clear:
    RAILS_ENV: production
    ALLOWED_HOSTS: <%= ENV.fetch("ALLOWED_HOSTS", "") %>
    ALLOWED_CABLE_ORIGINS: <%= ENV.fetch("ALLOWED_CABLE_ORIGINS", "") %>
    OPENAI_REALTIME_MODEL: <%= ENV.fetch("OPENAI_REALTIME_MODEL", "gpt-realtime-mini") %>
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - SECRET_KEY_BASE
    - OPENAI_API_KEY

asset_path: /rails/public/assets

builder:
  arch: amd64

ssh:
  user: ec2-user

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  logs: app logs -f
