services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      args:
        RUBY_VERSION: 4.0.1
        BUNDLE_WITHOUT: ""
    depends_on:
      - db
    environment:
      RAILS_ENV: development
      PORT: 3000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB_DEVELOPMENT: rails_chat_development
      POSTGRES_DB_DEVELOPMENT_CACHE: rails_chat_development_cache
      POSTGRES_DB_DEVELOPMENT_QUEUE: rails_chat_development_queue
      POSTGRES_DB_DEVELOPMENT_CABLE: rails_chat_development_cable
    command: bin/dev
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle

volumes:
  postgres_data:
  bundle_cache:
